<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: white;
      }
    </style>
  </head>
  <body>
    <video id="myVideo" autoplay loop muted style="width: 100%; height: auto">
      Your browser does not support the video tag.
    </video>
    <script>
      var video = document.getElementById("myVideo");

      if (video.canPlayType("video/webm")) {
        video.src = "./ELVIS.webm";
      } else if (video.canPlayType("video/mp4")) {
        video.src = "./ELVIS.mp4";
      }

      video.playbackRate = 0.9;
    </script>
  </body>
</html>
